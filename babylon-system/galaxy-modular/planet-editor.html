<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Planet Editor — Babylon System</title>
  <link rel="stylesheet" href="./planet-editor.css"/>
  <style>
    /* Pequeña barra para navegar entre páginas del proyecto */
    .topbar{
      position:fixed; left:12px; top:12px; z-index:1000;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      font-size: 13px;
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 10px;
      padding: 8px 10px;
      backdrop-filter: blur(6px);
    }
    .topbar a{ color:#cfe6ff; text-decoration:none; }
    .topbar a:hover{ text-decoration:underline; }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="./index.html">← Volver a la galaxia</a>
  </div>

  <canvas id="renderCanvas"></canvas>

  <!-- UMD (sin bundler) -->
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>

  <!-- Planet Editor runtime (mismos módulos que usa tu galaxia para planetas procedurales) -->
  <script src="./src/planetgen/noise.js"></script>
  <script src="./src/planetgen/hydrosphere.js"></script>
  <script src="./src/planetgen/clouds.js"></script>
  <script src="./src/planetgen/rings.js"></script>
  <script src="./src/planetgen/lithosphere.js"></script>
  <script src="./src/planetgen/geosphere.js"></script>
  <script src="./src/planetgen/atmosphere.js"></script>

  <!-- Editor main -->
  <script src="./src/planetgen/planetEditorMain.js"></script>
</body>
</html>
